<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Paletools Bookmark Drag Link</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; line-height: 1.4; }
    .drag-link {
      display: inline-block;
      padding: 0.8rem 1rem;
      border: 2px dashed #0b5fff;
      border-radius: 8px;
      text-decoration: none;
      color: #0b5fff;
      font-weight: 700;
      user-select: none;
      -webkit-user-drag: element;
    }
    .muted { color: #666; }
  </style>
</head>
<body>
  <h1>Drag This To Bookmarks Bar</h1>
  <p>Same approach as pale.tools: this link is a full inline bookmark payload.</p>

  <a id="pt-bookmark" class="drag-link" draggable="true" href="#">Paletools iOS (Drag Me)</a>
  <p class="muted" id="status">Preparing bookmark...</p>

  <p><a href="./futgg-futbin-rating.html">FUT.GG FUTBIN Rating userscript</a></p>

  <script>
    (async function () {
      var build = 'pt-futgg-20260408-46';
      var key = '';
      try {
        key = new URLSearchParams(window.location.search).get('k') || '';
      } catch (e) {}
      var link = document.getElementById('pt-bookmark');
      var status = document.getElementById('status');
      var scriptUrl = './mobile-bookmark.prod.js?v=' + encodeURIComponent(build) + (key ? '&k=' + encodeURIComponent(key) : '');
      try {
        var resp = await fetch(scriptUrl, { cache: 'no-store' });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        var text = await resp.text();
        (0, eval)(text);
      } catch (err) {
        status.textContent = 'Failed to load bookmark payload: ' + String(err);
        return;
      }
      var code = (window.paletools && window.paletools['paletools-mobile-custom']) || '';
      if (!code) {
        status.textContent = 'Failed to load bookmark payload.';
        return;
      }
      link.setAttribute('href', 'javascript:' + code);
      link.textContent = 'Paletools iOS ' + build + ' (Drag Me)';
      status.textContent = 'Ready (' + build + '). Delete old bookmark, drag this one, then run it on the web app page.';
    })();
  </script>
</body>
</html>
